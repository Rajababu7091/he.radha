<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>he.radha | Spiritual Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-overlay"></div>

    <header class="profile-header">
        <div class="container header-content">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search radhe rani wallpaper or any prompt...">
            </div>
            <div class="profile-container-wrapper">
                <div class="profile-pic-container">
                    <img src="images/img_12.png" alt="he.radha Profile" class="profile-pic">
                    <div class="glow-ring"></div>
                </div>
                <div class="profile-info">
                    <div class="username-row">
                        <h1>he.radha <i class="fa-solid fa-certificate verified-badge"></i></h1>
                        <a href="https://instagram.com/he.radha" target="_blank" class="follow-btn">Follow</a>
                    </div>
                    <div class="bio">
                        <p class="name">🌸 he.radha</p>
                        <p>Spreading love & good vibes ✨</p>
                        <p>🎥 Videos & Content</p>
                        <p>💌 For Paid Promotion / Collaboration DM</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="gallery-container container">
        <div class="masonry-grid" id="galleryGrid">
            <!-- Items injected via JS -->
        </div>
    </main>

    <footer>
        <p>Made with devotion for he.radha ✨</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
